databases:
  - name: drunkva-db
    plan: free
    databaseName: drunkva_db
    user: drunkva

services:
  - type: web
    name: drunkva-api
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: drunkva-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SQL_ECHO
        value: "false"
      - key: CORS_ORIGINS
        sync: false
