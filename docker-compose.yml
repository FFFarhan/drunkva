version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: drunkva_db
    environment:
      POSTGRES_DB: drunkva_db
      POSTGRES_USER: drunkva
      POSTGRES_PASSWORD: drunkva_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drunkva"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: drunkva_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://drunkva:drunkva_pass@db:5432/drunkva_db
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      SQL_ECHO: "false"
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  postgres_data:
